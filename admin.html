<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#a84332"><title>管理员后台</title><link rel="icon" href="icon.svg"><link rel="stylesheet" href="assets/style.css"></head><body><header class="topbar"><div class="brand"><span class="brand-mark">🔐</span><h1>管理员后台</h1></div><nav class="topnav"><a href="index.html">返回地图</a></nav></header><main class="page"><section class="panel wide"><div id="login" class="unlock"><h2>管理员登录</h2><label for="password">管理员密码</label><input id="password" type="password" autocomplete="current-password"><button id="login-btn" class="primary" type="button">进入后台</button></div><div id="dashboard" hidden><div class="panel-head"><div><h2>班级名单管理</h2><p>生成个人链接、审核资料、重置编辑凭证或导出名单。</p></div><span id="admin-count" class="badge">0</span></div><h3>新增同学名额</h3><form id="create-form" class="button-row"><input id="new-name" placeholder="初始昵称，例如：同学01" required maxlength="30"><button id="create-btn" class="primary" type="submit">生成专属链接</button></form><div id="credential-box" class="credentials" hidden><label for="credentials">请把链接和编辑码一起发给对应同学</label><textarea id="credentials" rows="4" readonly></textarea><button id="copy-credentials" class="secondary" type="button">复制全部</button></div><div class="admin-toolbar"><input id="admin-search" placeholder="搜索昵称、学校、地区"><div class="button-row"><button id="refresh" class="secondary" type="button">刷新</button><button id="export-csv" class="secondary" type="button">导出 CSV</button><button id="export-json" class="secondary" type="button">导出 JSON</button></div></div><div class="table-wrap"><table><thead><tr><th>昵称</th><th>学校</th><th>地区</th><th>公开</th><th>审核</th><th>操作</th></tr></thead><tbody id="tbody"></tbody></table></div></div><p id="status" class="form-status" aria-live="polite"></p></section></main><script type="module" src="assets/admin.js"></script></body></html>
