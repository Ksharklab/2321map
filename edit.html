<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#a84332"><title>填写我的资料</title><link rel="icon" href="icon.svg"><link rel="stylesheet" href="assets/style.css"></head><body><header class="topbar"><div class="brand"><span class="brand-mark">✏️</span><h1>填写我的资料</h1></div><nav class="topnav"><a href="index.html">返回地图</a></nav></header><main class="page"><section class="panel"><div class="panel-head"><div><h2>个人资料</h2><p>地图只公开昵称、学校和城市，不填写精确地址。</p></div></div><p class="note">专属链接和个人编辑码相当于钥匙，请不要转发给无关人员。</p><div id="missing-token" class="warning-box" hidden><strong>当前不是专属编辑链接</strong><p>请打开管理员发给你的完整链接，地址中应包含 <code>?token=...</code>。</p></div><div id="unlock" class="unlock"><label for="pin">个人编辑码</label><input id="pin" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="例如：123456"><button id="verify" class="primary" type="button">验证并读取资料</button></div><form id="profile-form" hidden><div class="form-grid"><div><label for="name">公开昵称</label><input id="name" required maxlength="30" placeholder="建议使用同学熟悉的昵称"></div><div><label for="school">学校</label><input id="school" required maxlength="80" placeholder="学校或院校名称"></div><div><label for="province">省份</label><select id="province" required></select></div><div><label for="city">城市/地区</label><select id="city" required></select></div><div class="full"><div id="place-preview" class="place-preview">尚未选择地区</div></div><div class="full"><label for="message">欢迎语</label><textarea id="message" maxlength="100" placeholder="例如：来广州记得找我吃饭！"></textarea></div><div class="full check-row"><input id="visible" type="checkbox"><label for="visible">同意在公开地图显示<small>关闭后，资料仍会保存在后台，但不会出现在公开地图。</small></label></div><div class="full"><button id="save" class="primary" type="submit">保存资料</button></div></div></form><p id="status" class="form-status" aria-live="polite"></p></section></main><script type="module" src="assets/edit.js"></script></body></html>
